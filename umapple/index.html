<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Umapple</title>
        <meta name="description" content="Bad Apple redrawn live from Umamusume portraits" />
        <link rel="canonical" href="https://pakadle.fun/umapple" />
        <meta name="theme-color" content="#000000" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="stylesheet" href="/umapple/style.css" />
    </head>
    <body>
        <canvas id="screen" role="img" aria-label="Umamusume portrait mosaic"></canvas>

        <div id="boot">
            <ul id="checks">
                <li id="chkP">Portraits</li>
                <li id="chkV">Video</li>
            </ul>
            <p id="loading">Loading.</p>
            <button id="start" type="button" hidden>Click to start</button>
        </div>

        <p id="hint" hidden>Press P to pause.</p>

        <video id="src" src="/umapple/badapple.mp4" preload="auto" muted loop playsinline></video>
        <script src="/umapple/game.js"></script>
    </body>
</html>
