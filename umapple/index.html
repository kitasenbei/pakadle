    <body>
        <canvas id="screen" role="img" aria-label="Umamusume portrait mosaic"></canvas>

        <div id="boot">
            <ul id="checks">
                <li id="chkP">Portraits</li>

            <button id="start" type="button" hidden>Click to start</button>

        <video id="src" src="/umapple/badapple.mp4" preload="auto" muted loop playsinline></video>
