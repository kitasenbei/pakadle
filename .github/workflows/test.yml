name: test

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # node:sqlite and the node:test runner both require Node 22+.
          node-version: "22"

      - name: Run tests
        # No dependencies in package.json, so no install step is needed.
        run: npm test
