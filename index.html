<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pakadle - Daily Umamusume Word Game</title>
  <meta name="description" content="Pakadle is a free daily word game for Umamusume fans. A Wordle-style puzzle where you guess the hidden Umamusume in six tries, with a new character every day." />
  <link rel="canonical" href="https://pakadle.fun/" />
  <meta name="theme-color" content="#FBF5EA" />

  <!-- Open Graph (link previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Pakadle" />
  <meta property="og:title" content="Pakadle - Daily Umamusume Word Game" />
  <meta property="og:description" content="A Wordle-style daily puzzle for Umamusume fans. Guess the hidden Umamusume in six tries. A new character every day." />
  <meta property="og:url" content="https://pakadle.fun/" />
  <meta property="og:image" content="https://pakadle.fun/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Pakadle - Daily Umamusume Word Game" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pakadle - Daily Umamusume Word Game" />
  <meta name="twitter:description" content="A Wordle-style daily puzzle for Umamusume fans. Guess the hidden Umamusume in six tries." />
  <meta name="twitter:image" content="https://pakadle.fun/og-image.png" />

  <!-- icons / install -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Pakadle",
    "url": "https://pakadle.fun/",
    "description": "A Wordle-style daily word game for Umamusume fans. Guess the hidden Umamusume in six tries, with a new character every day.",
    "image": "https://pakadle.fun/og-image.png",
    "inLanguage": "en",
    "genre": "Word puzzle",
    "applicationCategory": "Game",
    "operatingSystem": "Web browser",
    "isAccessibleForFree": true,
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <div id="petals" aria-hidden="true"></div>
  <div id="confetti" aria-hidden="true"></div>

  <header>
    <h1>
      <span class="jp">ウマ娘</span>
      <span class="en">Pakadle</span>
    </h1>
    <div class="actions">
      <div class="cross-links">
        <a class="cross-link" href="/pakapix">Try Pakapix 🐎</a>
        <a class="cross-link chess" href="/pakachess">Pakachess ♟️</a>
        <a class="cross-link duel" href="/duel">Duel ⚔️</a>
      </div>
      <button id="how-to" class="icon-btn" aria-label="How to play" title="How to Play">?</button>
      <button id="new-game">Stats</button>
    </div>
  </header>

  <main class="game">
    <div id="subtitle"></div>
    <div id="board"></div>
  </main>

  <div id="keyboard"></div>

  <div id="toast-wrap"></div>
  <div id="modal"></div>
  <div id="howto"></div>

  <script src="game.js"></script>
</body>
</html>
