<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pakadle — daily Umamusume word game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="petals" aria-hidden="true"></div>
  <div id="confetti" aria-hidden="true"></div>

  <header>
    <h1>
      <span class="jp">ウマ娘</span>
      <span class="en">Pakadle</span>
    </h1>
    <div class="actions">
      <button id="how-to" class="icon-btn" aria-label="How to play" title="How to Play">?</button>
      <button id="new-game">Stats</button>
    </div>
  </header>

  <main class="game">
    <div id="subtitle"></div>
    <div id="board"></div>
  </main>

  <div id="keyboard"></div>

  <div id="toast-wrap"></div>
  <div id="modal"></div>
  <div id="howto"></div>

  <script src="game.js"></script>
</body>
</html>
