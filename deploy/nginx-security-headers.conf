# Security headers for Pakadle. http context (conf.d), so it applies to every
# server block without editing the certbot-managed vhost. The pakadle vhost sets
# no add_header of its own, so these are inherited cleanly.
#
# CSP is scoped to exactly what the page loads:
#   - scripts: self only (no inline, no external) -> blocks injected/external JS
#   - styles : self + inline attrs + Google Fonts stylesheet
#   - fonts  : Google Fonts
#   - images : self + the Umamusume wiki CDN (portraits) + data:
#   - xhr    : self (the /api endpoints)

server_tokens off;

add_header X-Content-Type-Options   "nosniff"                              always;
add_header X-Frame-Options          "DENY"                                 always;
add_header Referrer-Policy          "no-referrer"                          always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://static.wikia.nocookie.net data:; connect-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
