# Pakadle reverse proxy: port 80 in front of the Node server on 127.0.0.1:3000
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name pakadle.fun www.pakadle.fun;

    client_max_body_size 1m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # WebSocket endpoints: Pakachess online + Pakadle Duel both ride the same
    # server-authoritative WS server. These need the HTTP/1.1 Upgrade dance and a
    # long read timeout so an idle game isn't dropped mid-match (the app sends a
    # ping every 25s; 1h here is generous headroom). Must come before "location /".
    location ~ ^/(pakachess|duel)/ws$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
