# Per-client-IP rate + connection limits for Pakadle.
# Lives in the http context (conf.d is included there), so it applies to every
# server block without editing the certbot-managed pakadle.conf.
#
# Goal: stop request floods / DoS and throttle scripted guess brute-forcing,
# while staying generous enough that real players (and modest shared NATs)
# never notice. A human guesses every few seconds, so 8 r/s sustained with a
# burst of 16 is comfortable for pages and the /api guess endpoints.
#
# STATIC ASSETS ARE EXEMPTED from the request-rate limit. A single page load
# (PakaDB especially) legitimately fires far more than `burst` image/font/css/js
# requests at once; under the old global limit the excess got 429s — dropping
# images at random AND tripping fail2ban's nginx-limit-req jail (which could ban
# a tester's IP outright). We map those requests to an empty key, which nginx
# treats as "not rate-limited", while pages and /api stay throttled. The per-IP
# connection cap still applies to everything.
#
# NOTE: keys on $binary_remote_addr, the direct client IP — correct while DNS
# points straight at this box. If you ever front it with Cloudflare, enable the
# realip module so the true client IP is used instead of Cloudflare's.

# empty key for static assets => nginx does not rate-limit them; real IP otherwise.
map $uri $pakadle_req_key {
    default                                                                        $binary_remote_addr;
    ~*\.(?:png|jpe?g|gif|webp|svg|ico|woff2?|ttf|otf|eot|mp4|css|js|json|map|txt)$  "";
}

limit_req_zone  $pakadle_req_key    zone=pakadle_req:10m  rate=8r/s;
limit_conn_zone $binary_remote_addr zone=pakadle_conn:10m;

limit_req_status  429;
limit_conn_status 429;

# apply globally (cascades to all server/location blocks)
limit_req  zone=pakadle_req burst=16 nodelay;
limit_conn pakadle_conn 15;
