# Per-client-IP rate + connection limits for Pakadle.
# Lives in the http context (conf.d is included there), so it applies to every
# server block without editing the certbot-managed pakadle.conf.
#
# Goal: stop request floods / DoS while never getting in the way of a real page
# load. PakaDB pages pull a LOT of images at once, so the old rate=8r/s burst=16
# 429'd legitimate asset bursts (and tripped fail2ban's nginx-limit-req jail).
#
# The clean nginx way to exempt assets is a per-location `limit_req` override, but
# that means editing the certbot-managed TLS vhost. Instead we keep one simple
# per-IP limit here and make it generous enough that an image-heavy page never
# hits it, while a genuine flood still does: burst=200 lets a whole gallery load
# instantly, then 40 r/s sustained. (An earlier attempt mapped assets to an empty
# limit key — nginx does NOT skip empty keys for limit_req the way it does for
# limit_conn, so every asset shared one bucket and still 429'd. Removed.)
#
# NOTE: keys on $binary_remote_addr, the direct client IP — correct while DNS
# points straight at this box. If you ever front it with Cloudflare, enable the
# realip module so the true client IP is used instead of Cloudflare's.

limit_req_zone  $binary_remote_addr zone=pakadle_req:10m  rate=40r/s;
limit_conn_zone $binary_remote_addr zone=pakadle_conn:10m;

limit_req_status  429;
limit_conn_status 429;

# apply globally (cascades to all server/location blocks)
limit_req  zone=pakadle_req burst=200 nodelay;
limit_conn pakadle_conn 30;
