<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pakachess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/pakachess/style.css" />
</head>
<body>
  <div id="petals" aria-hidden="true"></div>
  <header>
    <h1><span class="jp">ウマ娘</span> <span class="en">Pakachess</span></h1>
    <div class="actions">
      <a class="cross-link" href="/">← Pakadle</a>
      <button id="to-menu" hidden>Menu</button>
      <button id="new-game" hidden>New Game</button>
    </div>
  </header>

  <main>
    <!-- entry screen: pick a mode -->
    <div id="menu">
      <div class="name-row">
        <label for="name-input">Your name</label>
        <input id="name-input" type="text" maxlength="24" placeholder="Trainer" autocomplete="off" spellcheck="false" />
      </div>
      <div class="menu-grid">
        <button class="mode-card" id="mode-bot">
          <span class="mode-emoji">🥕</span>
          <span class="mode-name">Play PakaBot</span>
        </button>
        <button class="mode-card online" id="mode-online">
          <span class="mode-emoji">🤝</span>
          <span class="mode-name">Play Online</span>
        </button>
      </div>
      <div id="room-entry" hidden>
        <p class="room-label">Room code</p>
        <input id="room-input" maxlength="8" placeholder="ABCD" autocomplete="off" spellcheck="false" />
        <div class="room-btns">
          <button id="room-cancel" class="ghost-btn">Back</button>
          <button id="room-play" class="primary-btn">Play</button>
        </div>
      </div>
      <div id="waiting" hidden>
        <div class="spinner"></div>
        <p class="wait-text">Waiting for your friend...</p>
        <p class="wait-room">Room <span id="wait-code"></span></p>
        <p class="wait-hint">Playing as <span id="wait-name"></span></p>
        <button id="cancel-wait" class="ghost-btn">Cancel</button>
      </div>
    </div>

    <!-- the game itself -->
    <div id="game" hidden>
      <div id="status">Your move</div>
      <div id="disc-banner" hidden>Opponent disconnected, waiting for them to return...</div>
      <div class="layout">
        <div class="boardcol">
          <div class="tray top" id="tray-top"></div>
          <div id="board"></div>
          <div class="tray bottom" id="tray-bottom"></div>
        </div>
        <aside class="panel">
          <div class="clocks">
            <div class="clock opp" id="clock-opp"><span class="who" id="opp-name">PakaBot</span><span class="time">10:00</span></div>
            <div class="clock self" id="clock-self"><span class="who">You</span><span class="time">10:00</span></div>
          </div>
          <div class="panel-h">Moves</div>
          <div class="navrow">
            <button class="nav" id="nav-first" title="First move (↑)">⏮</button>
            <button class="nav" id="nav-prev" title="Previous (←)">◀</button>
            <button class="nav" id="nav-next" title="Next (→)">▶</button>
            <button class="nav" id="nav-last" title="Latest (↓)">⏭</button>
          </div>
          <div class="movelist" id="movelist"></div>
        </aside>
      </div>
      <details id="legend-wrap">
        <summary>which uma is which piece?</summary>
        <div id="legend"></div>
      </details>
    </div>
  </main>

  <!-- resign confirmation -->
  <div id="modal" hidden>
    <div class="modal-card">
      <p class="modal-title">Resign this game?</p>
      <div class="modal-btns">
        <button id="modal-cancel" class="ghost-btn">Keep playing</button>
        <button id="modal-confirm" class="danger-btn">Resign</button>
      </div>
    </div>
  </div>

  <script src="/pakachess/engine.js"></script>
  <script src="/pakachess/game.js"></script>
  <script>
    // build the legend from the same map (kept tiny + standalone)
    (function () {
      const L = [
        ["p", "Pawn", "Haru Urara"], ["n", "Knight", "Seiun Sky"], ["b", "Bishop", "Calstone Light O"],
        ["r", "Rook", "Orfevre"], ["q", "Queen", "Aston Machan"], ["k", "King", "Durandal"],
      ];
      const IMG = {
        p:"https://static.wikia.nocookie.net/umamusume/images/2/25/Haru_Urara_%28Main%29.png/revision/latest/scale-to-width-down/120",
        n:"https://static.wikia.nocookie.net/umamusume/images/c/cd/Seiun_Sky_%28Main%29.png/revision/latest/scale-to-width-down/120",
        b:"https://static.wikia.nocookie.net/umamusume/images/a/a5/Calstone_Light_O_%28Main%29.png/revision/latest/scale-to-width-down/120",
        r:"https://static.wikia.nocookie.net/umamusume/images/d/dc/Orfevre_%28Main%29.png/revision/latest/scale-to-width-down/120",
        q:"https://static.wikia.nocookie.net/umamusume/images/b/b3/Aston_Machan_%28Main%29.png/revision/latest/scale-to-width-down/120",
        k:"https://static.wikia.nocookie.net/umamusume/images/f/fb/Durandal_%28Main%29.png/revision/latest/scale-to-width-down/120",
      };
      document.getElementById("legend").innerHTML = L.map(([t, role, nm]) =>
        '<div class="lg"><div class="piece w"><img referrerpolicy="no-referrer" src="' + IMG[t] + '"></div>' +
        '<div><b>' + role + '</b><br>' + nm + '</div></div>').join("");
    })();
  </script>
</body>
</html>
