<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PakaDB - Umamusume Database</title>
  <meta name="description" content="Rich Umamusume character database: aptitudes, stats, growth, and skills. Breeding support tool." />
  <meta name="theme-color" content="#FBF5EA" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/pakadb/pakadb.css" />
</head>
<body>
  <!-- top control strip -->
  <header class="cp-bar">
    <div class="cp-brand">
      <span class="cp-logo">PAKA<b>DB</b></span>
      <div class="cp-tabs" id="cp-tabs">
        <button class="cp-tab on" data-view="db">DATABASE</button>
        <button class="cp-tab" data-view="breed">BREEDING</button>
      </div>
      <span class="cp-meta" id="cp-count">--</span>
    </div>
    <div class="cp-controls" id="cp-db-controls">
      <input id="cp-search" class="cp-input" type="search" placeholder="SEARCH NAME…" autocomplete="off" spellcheck="false" aria-label="Search by name" />
      <div class="pd-dd" id="cp-sort" data-value="name" data-prefix="SORT: ">
        <button class="pd-dd-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="pd-dd-label">SORT: NAME</span>
          <span class="pd-dd-caret" aria-hidden="true"></span>
        </button>
        <ul class="pd-dd-menu" role="listbox" aria-label="Sort by">
          <li class="pd-dd-opt" role="option" data-value="name">NAME</li>
          <li class="pd-dd-opt" role="option" data-value="rarity">RARITY</li>
          <li class="pd-dd-opt" role="option" data-value="speed">SPEED</li>
          <li class="pd-dd-opt" role="option" data-value="stamina">STAMINA</li>
          <li class="pd-dd-opt" role="option" data-value="power">POWER</li>
          <li class="pd-dd-opt" role="option" data-value="guts">GUTS</li>
          <li class="pd-dd-opt" role="option" data-value="wit">WIT</li>
        </ul>
      </div>
      <a class="cp-exit" href="/">EXIT ▸</a>
    </div>
    <div class="cp-controls" id="cp-breed-controls" hidden>
      <button class="cp-ghost" id="cp-roster-open">SAVED UMAS</button>
      <button class="cp-ghost" id="cp-breed-reset">RESET TREE</button>
      <a class="cp-exit" href="/">EXIT ▸</a>
    </div>
  </header>

  <!-- ===== DATABASE view ===== -->
  <div id="view-db">
    <div class="cp-filters" id="cp-filters"></div>
    <div class="cp-adv" id="cp-adv" hidden></div>
    <main class="cp-grid" id="cp-grid" aria-live="polite"></main>
    <p class="cp-empty" id="cp-empty" hidden>No beautiful mares match that filter.</p>
  </div>

  <!-- ===== BREEDING view ===== -->
  <div id="view-breed" hidden>
    <div class="bd-summary" id="bd-summary"></div>
    <div class="bd-stage" id="bd-stage"></div>

    <!-- inline slot picker (appears under the tree when a slot is tapped) -->
    <div class="bd-picker" id="bd-picker" hidden>
      <div class="bd-picker-head">
        <span class="bd-picker-title" id="bd-picker-title">Assign</span>
        <button class="cp-ghost bd-picker-clear" id="bd-picker-clear">CLEAR</button>
        <button class="dh-x" id="bd-picker-close">✕</button>
      </div>
      <input id="bd-picker-search" class="cp-input bd-picker-search" type="search" placeholder="SEARCH MARE…" autocomplete="off" spellcheck="false" />
      <div class="bd-picker-list" id="bd-picker-list"></div>
    </div>

    <div class="bd-coverage" id="bd-coverage"></div>
    <div class="bd-factors" id="bd-factors"></div>
  </div>

  <!-- detail drawer (database) -->
  <aside class="cp-drawer" id="cp-drawer" aria-hidden="true">
    <div class="cp-drawer-inner" id="cp-drawer-inner"></div>
  </aside>

  <!-- slot picker (breeding) -->
  <div class="cp-picker" id="cp-picker" hidden>
    <div class="cp-picker-box">
      <div class="cp-picker-head">
        <input id="cp-picker-search" class="cp-input" type="search" placeholder="SEARCH MARE…" autocomplete="off" spellcheck="false" />
        <button class="cp-ghost" id="cp-picker-clear">CLEAR SLOT</button>
        <button class="dh-x" id="cp-picker-x">✕</button>
      </div>
      <div class="cp-picker-list" id="cp-picker-list"></div>
    </div>
  </div>

  <!-- saved-uma roster -->
  <div class="cp-picker" id="cp-roster" hidden>
    <div class="cp-picker-box">
      <div class="cp-picker-head">
        <b class="cp-modal-title">Saved Umas</b>
        <button class="cp-ghost" id="cp-roster-new">+ NEW UMA</button>
        <button class="dh-x" id="cp-roster-x">✕</button>
      </div>
      <div class="cp-picker-list" id="cp-roster-list"></div>
    </div>
  </div>

  <!-- spark editor -->
  <div class="cp-picker" id="cp-editor" hidden>
    <div class="cp-picker-box">
      <div class="cp-picker-head">
        <b class="cp-modal-title" id="cp-editor-title">Edit Uma</b>
        <button class="cp-ghost" id="cp-editor-save">SAVE</button>
        <button class="dh-x" id="cp-editor-x">✕</button>
      </div>
      <div class="cp-picker-list" id="cp-editor-body"></div>
    </div>
  </div>

  <div class="cp-scrim" id="cp-scrim" hidden></div>

  <script src="/pakadb/pakadb.js" defer></script>
</body>
</html>
