<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PakaDB - Umamusume Database</title>
  <meta name="description" content="Rich Umamusume character database: aptitudes, stats, growth, and skills. Breeding support tool." />
  <meta name="theme-color" content="#FBF5EA" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/pakadb/pakadb.css" />
</head>
<body>
  <!-- top control strip -->
  <header class="cp-bar">
    <div class="cp-brand">
      <span class="cp-logo">PAKA<b>DB</b></span>
      <div class="cp-tabs" id="cp-tabs">
        <button class="cp-tab on" data-view="db">DATABASE</button>
        <button class="cp-tab" data-view="breed">BREEDING</button>
        <button class="cp-tab" data-view="share">HORSESHARE</button>
      </div>
      <span class="cp-meta" id="cp-count">--</span>
    </div>
    <div class="cp-controls" id="cp-db-controls">
      <input id="cp-search" class="cp-input" type="search" placeholder="SEARCH NAME…" autocomplete="off" spellcheck="false" aria-label="Search by name" />
      <div class="pd-dd" id="cp-sort" data-value="name" data-prefix="SORT: ">
        <button class="pd-dd-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="pd-dd-label">SORT: NAME</span>
          <span class="pd-dd-caret" aria-hidden="true"></span>
        </button>
        <ul class="pd-dd-menu" role="listbox" aria-label="Sort by">
          <li class="pd-dd-opt" role="option" data-value="name">NAME</li>
          <li class="pd-dd-opt" role="option" data-value="rarity">RARITY</li>
          <li class="pd-dd-opt" role="option" data-value="speed">SPEED</li>
          <li class="pd-dd-opt" role="option" data-value="stamina">STAMINA</li>
          <li class="pd-dd-opt" role="option" data-value="power">POWER</li>
          <li class="pd-dd-opt" role="option" data-value="guts">GUTS</li>
          <li class="pd-dd-opt" role="option" data-value="wit">WIT</li>
        </ul>
      </div>
      <button class="cp-ghost" id="cp-view-toggle" type="button" aria-pressed="false">IMAGES</button>
      <a class="cp-exit" href="/">EXIT ▸</a>
    </div>
    <div class="cp-controls" id="cp-breed-controls" hidden>
      <button class="cp-ghost" id="cp-roster-open">SAVED UMAS</button>
      <button class="cp-ghost" id="cp-breed-reset">RESET TREE</button>
      <a class="cp-exit" href="/">EXIT ▸</a>
    </div>
    <div class="cp-controls" id="cp-share-controls" hidden>
      <span class="cp-meta">Share bred horses + your trainer ID</span>
      <a class="cp-exit" href="/">EXIT ▸</a>
    </div>
  </header>

  <!-- ===== DATABASE view ===== -->
  <div id="view-db">
    <div class="cp-filters" id="cp-filters"></div>
    <div class="cp-adv" id="cp-adv" hidden></div>
    <main class="cp-grid" id="cp-grid" aria-live="polite"></main>
    <p class="cp-empty" id="cp-empty" hidden>No beautiful mares match that filter.</p>
  </div>

  <!-- ===== BREEDING view ===== -->
  <div id="view-breed" hidden>
    <div class="bd-workspace">
      <!-- saved-uma rail: drag a uma onto any tree/graph slot to assign it -->
      <aside class="bd-umas" id="bd-umas">
        <div class="bd-umas-head"><b class="cp-modal-title">Saved Umas</b><button class="cp-ghost bd-umas-add" id="bd-umas-add">+ ADD</button></div>
        <div class="bd-umas-list" id="bd-umas-list"></div>
      </aside>
      <div class="bd-left">
        <!-- view toggle: pedigree TREE or radial GRAPH; projected foal + pool stay below both -->
        <div class="bd-toolbar">
          <div class="bd-seg" role="tablist" aria-label="Breeding view">
            <button class="bd-seg-btn on" id="bd-view-tree" data-bview="tree" role="tab">TREE</button>
            <button class="bd-seg-btn" id="bd-view-graph" data-bview="graph" role="tab">GRAPH</button>
          </div>
          <button class="bd-tool-btn" id="bd-open-proj">Projected foal</button>
          <button class="bd-tool-btn" id="bd-open-pool">Factor pool</button>
        </div>
        <div class="bd-main view-tree">
          <div class="bd-affinity" id="bd-affinity"></div>
          <div class="bd-stage" id="bd-stage"></div>
        </div>
      </div>
      <!-- tree profiles: permanent right-side panel, flush + full height -->
      <aside class="bd-profiles" id="bd-profiles">
        <div class="bd-profiles-head"><b class="cp-modal-title">Tree Profiles</b></div>
        <div class="cp-picker-list bd-profiles-list" id="cp-trees-body"></div>
      </aside>
    </div>

    <!-- inline slot picker (appears under the tapped slot) -->
    <div class="bd-picker" id="bd-picker" hidden>
      <div class="bd-picker-head">
        <span class="bd-picker-title" id="bd-picker-title">Assign</span>
        <button class="cp-ghost bd-picker-clear" id="bd-filter-toggle">FILTERS</button>
        <button class="cp-ghost bd-picker-clear" id="bd-picker-clear">CLEAR</button>
        <button class="dh-x" id="bd-picker-close">✕</button>
      </div>
      <div class="bp-current" id="bd-picker-current"></div>
      <input id="bd-picker-search" class="cp-input bd-picker-search" type="search" placeholder="SEARCH MARE…" autocomplete="off" spellcheck="false" />
      <div class="bd-picker-list" id="bd-picker-list"></div>
    </div>

    <!-- mare-picker filters, docked beside the picker -->
    <div class="bd-filter" id="bd-filter" hidden>
      <div class="bd-filter-head">Filter mares</div>
      <div class="bd-filter-body" id="bd-filter-body"></div>
    </div>
  </div>

  <!-- ===== HORSESHARE view ===== -->
  <div id="view-share" hidden>
    <div class="hs-view">
      <div id="hs-compose"></div>
      <div id="hs-filters"></div>
      <div id="hs-feed"></div>
    </div>
  </div>

  <!-- skill filter picker (advanced filters) -->
  <div class="bd-picker" id="skill-picker" hidden>
    <div class="bd-picker-head">
      <span class="bd-picker-title">Filter by skill</span>
      <button class="cp-ghost bd-picker-clear" id="skill-clear">ANY</button>
      <button class="dh-x" id="skill-x">✕</button>
    </div>
    <input id="skill-search" class="cp-input bd-picker-search" type="search" placeholder="SEARCH SKILL…" autocomplete="off" spellcheck="false" />
    <div class="bd-picker-list" id="skill-list"></div>
  </div>

  <!-- white-spark picker (skill / race catalog, used by the spark editor) -->
  <div class="bd-picker" id="white-picker" hidden>
    <div class="bd-picker-head">
      <span class="bd-picker-title">White spark</span>
      <button class="dh-x" id="white-close">✕</button>
    </div>
    <input id="white-search" class="cp-input bd-picker-search" type="search" placeholder="SEARCH SKILL OR RACE…" autocomplete="off" spellcheck="false" />
    <div class="bd-picker-list" id="white-list"></div>
  </div>

  <!-- uma picker (spark editor character selector) -->
  <div class="bd-picker" id="char-picker" hidden>
    <div class="bd-picker-head">
      <span class="bd-picker-title">Pick uma</span>
      <button class="cp-ghost bd-picker-clear" id="char-filter-toggle">FILTERS</button>
      <button class="dh-x" id="char-close">✕</button>
    </div>
    <input id="char-search" class="cp-input bd-picker-search" type="search" placeholder="SEARCH UMA…" autocomplete="off" spellcheck="false" />
    <div class="bd-picker-list" id="char-list"></div>
  </div>

  <!-- detail drawer (database) -->
  <aside class="cp-drawer" id="cp-drawer" aria-hidden="true">
    <div class="cp-drawer-inner" id="cp-drawer-inner"></div>
  </aside>

  <!-- slot picker (breeding) -->
  <div class="cp-picker" id="cp-picker" hidden>
    <div class="cp-picker-box">
      <div class="cp-picker-head">
        <input id="cp-picker-search" class="cp-input" type="search" placeholder="SEARCH MARE…" autocomplete="off" spellcheck="false" />
        <button class="cp-ghost" id="cp-picker-clear">CLEAR SLOT</button>
        <button class="dh-x" id="cp-picker-x">✕</button>
      </div>
      <div class="cp-picker-list" id="cp-picker-list"></div>
    </div>
  </div>

  <!-- saved-uma roster -->
  <div class="cp-picker" id="cp-roster" hidden>
    <div class="cp-picker-box">
      <div class="cp-picker-head">
        <b class="cp-modal-title">Saved Umas</b>
        <button class="cp-ghost" id="cp-roster-new">+ NEW UMA</button>
        <button class="dh-x" id="cp-roster-x">✕</button>
      </div>
      <div class="cp-picker-list" id="cp-roster-list"></div>
    </div>
  </div>

  <!-- spark editor -->
  <div class="cp-picker" id="cp-editor" hidden>
    <div class="cp-picker-box">
      <div class="cp-picker-head">
        <b class="cp-modal-title" id="cp-editor-title">Edit Uma</b>
        <button class="cp-ghost" id="cp-editor-save">SAVE</button>
        <button class="dh-x" id="cp-editor-x">✕</button>
      </div>
      <div class="cp-picker-list" id="cp-editor-body"></div>
    </div>
  </div>

  <!-- projected-foal / factor-pool readout (opened from the toolbar buttons) -->
  <div class="cp-picker" id="bd-fac-modal" hidden>
    <div class="cp-picker-box">
      <div class="cp-picker-head">
        <b class="cp-modal-title" id="bd-fac-title">Projected foal</b>
        <button class="dh-x" id="bd-fac-x">✕</button>
      </div>
      <div class="cp-picker-list" id="bd-fac-body"></div>
    </div>
  </div>

  <div class="cp-scrim" id="cp-scrim" hidden></div>

  <!-- breeding tree right-click context menu -->
  <div class="bd-ctx" id="bd-ctx" hidden></div>

  <!-- pakadle tooltip (single floating bubble, driven by [data-tip]) -->
  <div class="pk-tip" id="pk-tip" hidden></div>

  <script src="/pakadb/pakadb.js" defer></script>
</body>
</html>
